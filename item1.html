<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Detailed photos of an item." />
    <title>Item - Local, Friendly Help</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Header -->
    <header>
      <h1>Item Name</h1>
      <nav>
        <a href="gallery.html">← Back to Gallery</a>
      </nav>
    </header>

    <main>
      <!-- Item Description -->
      <section id="item-description">
        <h2>Item Name</h2>
        <p>Add a description about this item here.</p>
      </section>

      <!-- Item Photos Gallery -->
      <section id="item-gallery">
        <h2>Photos</h2>
        
        <div class="item-gallery">
          
          <!-- Photo 1 -->
          <div class="item-photo">
            <img src="images/item-1-photo-1.jpg" alt="Item photo 1" />
          </div>

          <!-- Photo 2 -->
          <div class="item-photo">
            <img src="images/item-1-photo-2.jpg" alt="Item photo 2" />
          </div>

          <!-- Photo 3 -->
          <div class="item-photo">
            <img src="images/item-1-photo-3.jpg" alt="Item photo 3" />
          </div>

          <!-- Photo 4 -->
          <div class="item-photo">
            <img src="images/item-1-photo-4.jpg" alt="Item photo 4" />
          </div>

          <!-- Add more photos as needed -->

        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer>
      <small>© 2026 Tech Repair & IT Help. All rights reserved.</small>
    </footer>
  </body>
</html>
